name: Build, release and publish container

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: release-and-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: Determine version
    if: github.ref_name == 'main' || github.ref_name == 'dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install release dependencies
        run: npm ci --ignore-scripts

      - name: Determine build version
        id: version
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          node --input-type=module <<'EOF'
          import { appendFile } from 'node:fs/promises';
          import { execFileSync } from 'node:child_process';
          import semanticRelease from 'semantic-release';

          const result = await semanticRelease({
            branches: ['main', { name: 'dev', prerelease: 'dev' }],
            ci: false,
            dryRun: true,
            plugins: ['@semantic-release/commit-analyzer']
          });
          const sha = process.env.COMMIT_SHA.slice(0, 8);
          const latestTag = execFileSync('git', ['tag', '--list', 'v[0-9]*', '--sort=-v:refname'], { encoding: 'utf8' })
            .trim()
            .split('\n')[0]
            ?.replace(/^v/, '') || '0.0.0';
          let version = result?.nextRelease.version || `${latestTag}-${sha}`;

          if (process.env.BRANCH_NAME === 'dev') {
            version = `${version.split('-')[0]}-${sha}`;
          }

          await appendFile(process.env.GITHUB_OUTPUT, `version=${version}\n`);
          EOF

  validate:
    name: Validate and build artifacts
    needs: prepare
    uses: ./.github/workflows/ci.yml
    with:
      app-version: ${{ needs.prepare.outputs.version }}

  release:
    name: Create release
    needs: [prepare, validate]
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install release dependencies
        run: npm ci --ignore-scripts

      - name: Create semantic release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          before="$(git tag --points-at HEAD --list 'v*' --sort=-v:refname | head -n1)"
          npx semantic-release
          after="$(git tag --points-at HEAD --list 'v*' --sort=-v:refname | head -n1)"

          if [ -n "$after" ] && [ "$after" != "$before" ]; then
            echo "version=${after#v}" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish container
    needs: [prepare, validate, release]
    if: always() && needs.validate.result == 'success' && (needs.release.result == 'success' || needs.release.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: artifacts/backend

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: latest=false
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=raw,value=latest-dev,enable=${{ github.ref_name == 'dev' }}
            type=semver,pattern={{major}},value=v${{ needs.release.outputs.version }},enable=${{ needs.release.outputs.version != '' }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.release.outputs.version }},enable=${{ needs.release.outputs.version != '' }}

      - name: Build and publish container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Backend/Dockerfile.deploy
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
