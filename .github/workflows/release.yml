name: Release and publish container

on:
  workflow_dispatch:

concurrency:
  group: release-and-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  validate:
    uses: ./.github/workflows/ci.yml

  release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Create semantic release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          before="$(git tag --points-at HEAD --list 'v*' --sort=-v:refname | head -n1)"
          npx semantic-release
          after="$(git tag --points-at HEAD --list 'v*' --sort=-v:refname | head -n1)"

          if [ -n "$after" ] && [ "$after" != "$before" ]; then
            echo "version=${after#v}" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: [validate, release]
    if: needs.release.outputs.version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Determine image version tags
        id: version
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        run: |
          version="$RELEASE_VERSION"
          major="${version%%.*}"
          minor="${version%.*}"

          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "minor=$minor" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=${{ steps.version.outputs.major }}
            type=raw,value=${{ steps.version.outputs.minor }}
            type=raw,value=latest
            type=sha

      - name: Build and publish container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
