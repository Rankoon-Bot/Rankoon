name: Build and test

on:
  pull_request:
  push:
    branches: ['**']
  workflow_call:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore backend dependencies
        run: dotnet restore Rankoon.sln
        working-directory: Backend

      - name: Build backend
        run: dotnet build Rankoon.sln --configuration Release --no-restore
        working-directory: Backend

      - name: Test backend
        run: dotnet test Rankoon.sln --configuration Release --no-build --no-restore
        working-directory: Backend

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: Frontend

      - name: Test frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless
        working-directory: Frontend

      - name: Build frontend
        run: npm run build
        working-directory: Frontend
