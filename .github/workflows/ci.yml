name: Build and test

on:
  workflow_call:
    inputs:
      app-version:
        description: Version embedded in the backend artifact
        required: true
        type: string

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore backend dependencies
        run: dotnet restore Rankoon.sln
        working-directory: Backend

      - name: Build backend
        run: dotnet build Rankoon.sln --configuration Release --no-restore -p:Version=${{ inputs.app-version }} -p:InformationalVersion=${{ inputs.app-version }}
        working-directory: Backend

      - name: Test backend
        run: dotnet test Rankoon.sln --configuration Release --no-build --no-restore
        working-directory: Backend

      - name: Publish backend artifact
        run: dotnet publish Rankoon.csproj --configuration Release --no-build --no-restore --output ../artifacts/backend -p:Version=${{ inputs.app-version }} -p:InformationalVersion=${{ inputs.app-version }}
        working-directory: Backend

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: artifacts/backend
          if-no-files-found: error
          retention-days: 1

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: Frontend

      - name: Test frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless
        working-directory: Frontend

      - name: Build frontend
        run: APP_VERSION=${{ inputs.app-version }} npm run build
        working-directory: Frontend

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist/Rankoon_Frontend/browser
          if-no-files-found: error
          retention-days: 1
